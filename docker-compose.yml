services:
  web:
    build: .
    container_name: vite-basic
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
    command: sh -lc "if [ -f package-lock.json ]; then npm ci; else npm i; fi; npm run dev -- --host 0.0.0.0 --port 5173"
